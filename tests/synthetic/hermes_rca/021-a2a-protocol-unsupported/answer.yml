model_response: |
  Hermes attempted to communicate with a peer agent using plain HTTP,
  but the peer expected the A2A protocol.

  The runtime currently does not provide a compatible A2A client,
  so the orchestration session failed during protocol negotiation.

  Root cause category: protocol_unsupported.
